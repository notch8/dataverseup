# Helm values for the "demo" GitHub Environment (staging / shared demo).
#
# **Edit literals in this file** for your environment: public hostname (ingress + dataverse_siteUrl), in-cluster
# Solr/Dataverse Service DNS (solrHttpBase + SOLR_* / DATAVERSE_URL), S3 bucket, Postgres identifiers, etc.
# They must stay consistent with your Helm **release name** and **namespace** (e.g. both `demo-dataverseup`).
#
# **envsubst** (CI: see `.github/workflows/deploy.yaml`) only injects secrets and the rollout nonce — not URLs:
#   $DB_PASSWORD, $SYSTEM_EMAIL, $SMTP_PASSWORD, $SMTP_AUTH, ${GITHUB_RUN_ID}
# Local render:
#   export DB_PASSWORD=... GITHUB_RUN_ID=manual-1 SYSTEM_EMAIL=... SMTP_PASSWORD=... SMTP_AUTH=
#   envsubst '$GITHUB_RUN_ID $DB_PASSWORD $SYSTEM_EMAIL $SMTP_PASSWORD $SMTP_AUTH' < ops/demo-deploy.tmpl.yaml > ops/demo-deploy.yaml
#
# Before first deploy: ConfigMap **dataverse-solr-conf** must ship Solr 9 conf (full tree or solr-conf.tgz),
# same lineage as docker-compose (IQSS conf under repo **config/** — see **docs/HELM.md**).
#
# With **awsS3.enabled**, create a **generic** Secret in the release namespace **before** Helm installs pods that
# mount it. The chart mounts it as AWS CLI files under `/secrets/aws-cli/.aws/`.
#
#   • Secret **metadata.name** must match **awsS3.existingSecret** below (default: aws-s3-credentials).
#   • Secret **data keys** must match **awsS3.secretKeys** (default: `credentials` and `config`) — file bodies in
#     the same format as `~/.aws/credentials` and `~/.aws/config`.
#   • **awsS3.profile** must match a profile stanza in those files: `[default]` in credentials, and either
#     `[default]` or `[profile yourname]` in config (see AWS CLI docs for named profiles).
#
# From your laptop (kubeconfig aimed at the cluster), examples — set NS to your namespace (e.g. demo-dataverseup):
#
#   NS=demo-dataverseup
#   kubectl create namespace "$NS" --dry-run=client -o yaml | kubectl apply -f -
#
#   # A) Reuse local CLI files (simplest if profiles already match awsS3.profile):
#   kubectl -n "$NS" create secret generic aws-s3-credentials \
#     --from-file=credentials="$HOME/.aws/credentials" \
#     --from-file=config="$HOME/.aws/config" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   # B) Two small files (avoids multiline --from-literal quoting); region must match awsS3.region:
#   printf '%s\n' '[default]' 'aws_access_key_id = AKIA...' 'aws_secret_access_key = ...' > /tmp/aws-credentials
#   printf '%s\n' '[default]' 'region = us-west-2' > /tmp/aws-config
#   kubectl -n "$NS" create secret generic aws-s3-credentials \
#     --from-file=credentials=/tmp/aws-credentials --from-file=config=/tmp/aws-config \
#     --dry-run=client -o yaml | kubectl apply -f && rm -f /tmp/aws-credentials /tmp/aws-config
#
#   # C) STS / assumed-role: add `aws_session_token = ...` under the same profile in the credentials file body.
#
# After creating or rotating the Secret, restart the Dataverse Deployment so the volume remounts.
# Full detail: **docs/HELM.md** (S3 file storage).

awsS3:
  enabled: true
  # Kubernetes Secret you create out-of-band (see comments above).
  existingSecret: "aws-s3-credentials"
  bucketName: "demo-dataverseup"
  endpointUrl: "https://s3.us-west-2.amazonaws.com"
  region: us-west-2
  # Must match the profile section in mounted .aws/credentials (e.g. [default]); override in values if needed.
  profile: default
  secretKeys:
    credentials: credentials
    config: config

replicaCount: 1

# CI sets GITHUB_RUN_ID (see .github/workflows/deploy.yaml) so each deploy changes this annotation and forces a
# new ReplicaSet. Local renders: export GITHUB_RUN_ID=manual-1 (or any string) when you need the same without CI.
podAnnotations:
  deploy.github.com/run-id: "${GITHUB_RUN_ID}"

# Docker Hub tag (not bare 6.10.1). Keeps deploy values explicit so Helm release history cannot stick to a bad tag.
image:
  repository: gdcc/dataverse
  tag: "6.10.1-noble-r0"

resources:
  limits:
    memory: 4Gi
    cpu: "1000m"
  requests:
    memory: 2Gi
    cpu: 100m

# Payara runs as uid 1000; fsGroup lets RWO volumes stay writable for /data and /dv/docroot.
podSecurityContext:
  fsGroup: 1000

# RWO PVC for Dataverse /data — correct for replicaCount: 1. GDCC K8s guide: use ReadWriteMany for /data (and
# docroot) only for multi-instance Payara; with S3 (besties awsS3) local /data is partly temp/ingest. See
# https://k8s-docs.gdcc.io/en/latest/day1/storage.html#application-server
persistence:
  enabled: true
  mountPath: /data
  size: 20Gi
  accessMode: ReadWriteOnce
  storageClassName: ""

# Branding / docroot (legacy dataverse-k8s pattern: separate "docroot" PVC). gdcc/dataverse serves /logos/* from
# DATAVERSE_FILES_DOCROOT → mount at /dv/docroot. Chart creates <release>-docroot or set existingClaim.
docrootPersistence:
  enabled: true
  mountPath: /dv/docroot
  size: 6Gi
  accessMode: ReadWriteOnce
  storageClassName: ""
  existingClaim: ""

# Navbar logo file on disk (chart embeds **branding/docroot/logos/navbar/logo.svg**). Init copies it to
# `/dv/docroot/logos/navbar/logo.svg` so it matches **LOGO_CUSTOMIZATION_FILE** in **branding/branding.env**
# (API path `/logos/navbar/logo.svg`). For custom header/footer/CSS, add files under **branding/docroot/branding/**
# in the repo, extend **branding.env** with `/dv/docroot/branding/...` paths, then rely on **bootstrapJob.mode: compose**
# (below) to PUT those settings after configbaker — or run **scripts/apply-branding.sh** manually with an admin token.
brandingNavbarLogos:
  enabled: true

ingress:
  enabled: true
  className: nginx-ingress
  annotations:
    nginx.org/client-max-body-size: "0"
    cert-manager.io/cluster-issuer: letsencrypt-production-dns
  hosts:
    - host: "demo-dataverseup.notch8.cloud"
      paths:
        - path: /
          pathType: Prefix
    - host: "*.demo-dataverseup.notch8.cloud"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - "demo-dataverseup.notch8.cloud"
        - "*.demo-dataverseup.notch8.cloud"
      secretName: "demo-dataverseup-tls"

# Standalone Solr — **solr:9.10.1** matches **docker-compose.yml** and **charts/dataverseup/values.yaml** (IQSS Solr 9 conf).
internalSolr:
  enabled: true
  image: solr:9.10.1
  imagePullPolicy: IfNotPresent
  podSecurityContext:
    fsGroup: 8983
  # RWO matches GDCC: standalone Solr index — "ReadWriteOnce ... sufficient" (not SolrCloud yet).
  # https://k8s-docs.gdcc.io/en/latest/day1/storage.html#index-server
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: ""
  resources: {}

# Wait for in-cluster Solr core ping before Payara (standalone). For external SolrCloud, set internalSolr.enabled: false,
# mode: cloud, zkConnect, solrHttpBase, and replicationFactor — see charts/dataverseup/values.yaml.
solrInit:
  enabled: true
  mode: standalone
  image: solr:9.10.1
  imagePullPolicy: IfNotPresent
  solrBin: /opt/solr/bin/solr
  securityContext:
    runAsUser: 8983
    runAsGroup: 8983
    runAsNonRoot: true
  zkConnect: ""
  # Must match in-cluster Solr Service DNS for this release/namespace (edit if your Helm release or ns differs).
  solrHttpBase: "http://demo-dataverseup-solr.demo-dataverseup.svc.cluster.local:8983"
  collection: dataverse
  configSetName: dataverse_config
  numShards: 1
  replicationFactor: 1
  confConfigMap: dataverse-solr-conf
  existingSecret: ""
  adminUser: ""
  adminPassword: ""
  resources: {}

# Compose mounts the full repo **init.d/** at `/opt/payara/init.d`. Enable this to ship the same `*.sh` bundle via
# the chart ConfigMap (see **initdFromChart** in **charts/dataverseup/values.yaml**). Scripts run in lexical order;
# **012/013-minio** expect compose MinIO (no-op or skip if you use S3 only). **1001-webhooks** needs **triggers/**
# on disk unless you mount it separately.
initdFromChart:
  enabled: true

# Mount init.d/010-mailrelay-set.sh (compose-compatible). Requires system_email (and related env) to do work.
mail:
  enabled: true

# Payara/Dataverse — external Postgres + Solr. Create DB + role on the server first (quoted names if hyphenated);
# see ops/kubernetes-deploy-checklist.md — DB name here must exist on the server (e.g. demo-dataverseup).
extraEnvVars:
  - name: DATAVERSE_DB_HOST
    value: postgres-postgresql.postgres.svc.cluster.local
  - name: DATAVERSE_DB_USER
    value: "demo-dataverseup"
  - name: DATAVERSE_DB_PASSWORD
    value: $DB_PASSWORD
  - name: DATAVERSE_DB_NAME
    value: "demo-dataverseup"
  - name: POSTGRES_SERVER
    value: postgres-postgresql.postgres.svc.cluster.local
  - name: POSTGRES_PORT
    value: "5432"
  - name: POSTGRES_DATABASE
    value: "demo-dataverseup"
  - name: POSTGRES_USER
    value: "demo-dataverseup"
  - name: POSTGRES_PASSWORD
    value: $DB_PASSWORD
  - name: PGPASSWORD
    value: $DB_PASSWORD
  # Uppercase SOLR_* / DATAVERSE_SOLR_* are set by the chart when internalSolr.enabled (see templates/deployment.yaml).
  # Duplicate keys here caused kubectl apply warnings ("hides previous definition"). Override only for external Solr.
  - name: dataverse_solr_host
    value: "demo-dataverseup-solr.demo-dataverseup.svc.cluster.local"
  - name: dataverse_solr_port
    value: "8983"
  - name: dataverse_solr_core
    value: dataverse
  # In-cluster Dataverse HTTP base (for tooling that expects a full URL). If you mount compose-style init.d
  # that does http://${DATAVERSE_URL}/api, use host:port only (no scheme) instead.
  - name: DATAVERSE_URL
    value: "http://demo-dataverseup.demo-dataverseup.svc.cluster.local:80"
  # Official image (init_2_configure.sh): dataverse_* env → Payara create-system-properties (dots from underscores).
  # Without these, JSF often cannot resolve the public URL and "/" shows Dataverse "Page Not Found".
  - name: dataverse_siteUrl
    value: "https://demo-dataverseup.notch8.cloud"
  - name: dataverse_fqdn
    value: "demo-dataverseup"
  - name: DATAVERSE_SERVICE_HOST
    value: "demo-dataverseup"
  - name: hostname
    value: "demo-dataverseup"
  - name: JVM_OPTS
    value: "-Xmx2g -Xms2g"
  - name: DATAVERSE_PID_PROVIDERS
    value: demo
  - name: DATAVERSE_PID_DEFAULT_PROVIDER
    value: demo
  - name: DATAVERSE_PID_DEMO_TYPE
    value: FAKE
  - name: DATAVERSE_PID_DEMO_LABEL
    value: demo
  - name: DATAVERSE_PID_DEMO_AUTHORITY
    value: "10.5072"
  - name: DATAVERSE_PID_DEMO_SHOULDER
    value: FK2/
  - name: INIT_SCRIPTS_FOLDER
    value: /opt/payara/init.d
  # Payara JavaMail + :SystemEmail (init.d/010-mailrelay-set.sh).
  # Literal SMTP_* (override via GitHub Environment if you reintroduce envsubst for these keys).
  - name: SMTP_ADDRESS
    value: "smtp.sendgrid.net"
  - name: SMTP_USER_NAME
    value: "apikey"
  - name: SMTP_TYPE
    value: "plain"
  - name: SMTP_STARTTLS
    value: "true"
  - name: SMTP_PORT
    value: "587"
  - name: SMTP_ENABLED
    value: "true"
  - name: SMTP_DOMAIN
    value: "notch8.com"
  # Script reads these names (aligned with SMTP_* above).
  # no_reply_email → Payara JavaMail --fromaddress (outbound From). No separate Reply-To in the session;
  # mail clients reply to From when Reply-To is absent, so use support@ for both behaviors.
  - name: system_email
    value: "${SYSTEM_EMAIL}"
  - name: mailhost
    value: "smtp.sendgrid.net"
  - name: mailuser
    value: "apikey"
  - name: no_reply_email
    value: "support@notch8.com"
  - name: smtp_password
    value: "${SMTP_PASSWORD}"
  - name: smtp_port
    value: "587"
  - name: socket_port
    value: "587"
  - name: smtp_auth
    value: "${SMTP_AUTH}"
  - name: smtp_starttls
    value: "true"
  - name: smtp_type
    value: "plain"
  - name: smtp_enabled
    value: "true"

# gdcc/configbaker after install (post-install hook). Same tag as image.tag above.
# **mode: compose** — same order as compose: configbaker → **apply-branding.sh** (reads **branding/branding.env**
# baked into chart) → optional **seed-content** (fixtures). Does not run on plain `helm upgrade` when helmHook=true.
# Re-apply branding after changing **branding/**: use workflow "Run bootstrap job" with hook disabled, or
# **postUpgradeBrandingSeedJob** + admin API token Secret (see **charts/dataverseup/values.yaml**).
# If you wiped Postgres later, use GitHub Deploy → "Run bootstrap job" or apply a Job by hand.
#
# **existingAdminApiTokenSecret** is optional on first install (chart uses optional secretKeyRef). Create the
# Secret after you have a superuser API token so re-runs / already-bootstrapped DB work:
#   kubectl -n demo-dataverseup create secret generic dataverse-admin-api-token --from-literal=token=YOUR_UUID
bootstrapJob:
  enabled: true
  mode: compose
  helmHook: true
  timeout: 20m
  compose:
    waitMaxSeconds: 900
    waitSleepSeconds: 5
    seed: true
    existingAdminApiTokenSecret: dataverse-admin-api-token
    adminApiTokenSecretKey: token
