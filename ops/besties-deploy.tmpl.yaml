# # Helm values for the "besties" GitHub Environment (staging / shared demo).
# #
# # This file uses envsubst: every $VAR below must be exported (or use ../ops/render-besties-deploy.sh).
# # Required:
# #   export DB_PASSWORD='...'              # Postgres (DATAVERSE_DB_* / POSTGRES_* / PGPASSWORD)
# #   export DOLLAR='$'                     # Keeps literal $ for any $-prefixed YAML if needed later
# # Optional CI:
# #   export GITHUB_RUN_ID='...'            # pod rollout nonce (Actions sets this automatically)
# # Mail: non-secret SMTP_* + script envs are literal in extraEnvVars below (SendGrid / besties).
# # Secrets via envsubst: SMTP_PASSWORD, SYSTEM_EMAIL; optional SMTP_AUTH (empty = rely on SMTP_TYPE=plain).
# # Legacy MAIL_SMTP_PASSWORD is merged into SMTP_PASSWORD in the deploy workflow if SMTP_PASSWORD is unset.
# # Then:
# #   envsubst < ops/besties-deploy.tmpl.yaml > ops/besties-deploy.yaml
# #
# # Besties uses in-chart **standalone Solr** (no ZooKeeper, no HTTP auth) in the **same namespace** as Dataverse.
# # Service DNS (default release/namespace `demo-dataverse-besties`): `…-solr.<ns>.svc.cluster.local:8983`.
# # If you change `k8s_release_name` / `k8s_namespace` in Deploy, edit **internalSolr** is automatic; edit
# # **solrInit.solrHttpBase** and **DATAVERSE_SOLR_*** / **SOLR_*** host strings below to match `<release>-solr.<ns>`.
# #
# # Before first deploy: ConfigMap **dataverse-besties-solr-conf** — see ops/solr-init-setup.md .

# awsS3:
#   enabled: true
#   # Name of a Secret you create out-of-band (keys = secretKeys below).
#   existingSecret: "aws-s3-credentials"
#   bucketName: "demo-dataverse"
#   endpointUrl: "https://s3.us-west-2.amazonaws.com"
#   region: us-west-2
#   # Must match the profile section in mounted .aws/credentials (e.g. [default]); override in values if needed.
#   profile: default
#   secretKeys:
#     credentials: credentials
#     config: config

# replicaCount: 1

# # CI sets GITHUB_RUN_ID (see .github/workflows/deploy.yaml) so each deploy changes this annotation and forces a
# # new ReplicaSet. Local renders: export GITHUB_RUN_ID=manual-1 (or any string) when you need the same without CI.
# podAnnotations:
#   deploy.github.com/run-id: "${GITHUB_RUN_ID}"

# # Docker Hub tag (not bare 6.10.1). Keeps deploy values explicit so Helm release history cannot stick to a bad tag.
# image:
#   repository: gdcc/dataverse
#   tag: "6.10.1-noble-r0"

# resources:
#   limits:
#     memory: 4Gi
#     cpu: "1000m"
#   requests:
#     memory: 2Gi
#     cpu: 100m

# # Payara runs as uid 1000; fsGroup lets RWO volumes stay writable for /data and /dv/docroot.
# podSecurityContext:
#   fsGroup: 1000

# # RWO PVC for Dataverse /data — correct for replicaCount: 1. GDCC K8s guide: use ReadWriteMany for /data (and
# # docroot) only for multi-instance Payara; with S3 (besties awsS3) local /data is partly temp/ingest. See
# # https://k8s-docs.gdcc.io/en/latest/day1/storage.html#application-server
# persistence:
#   enabled: true
#   mountPath: /data
#   size: 20Gi
#   accessMode: ReadWriteOnce
#   storageClassName: ""

# # Branding / docroot (legacy dataverse-k8s pattern: separate "docroot" PVC). gdcc/dataverse serves /logos/* from
# # DATAVERSE_FILES_DOCROOT → mount at /dv/docroot. Chart creates <release>-docroot or set existingClaim.
# docrootPersistence:
#   enabled: true
#   mountPath: /dv/docroot
#   size: 6Gi
#   accessMode: ReadWriteOnce
#   storageClassName: ""
#   existingClaim: ""

