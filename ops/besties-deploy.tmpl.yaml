# # Standalone Solr in this release (official solr:8.11.2, core "dataverse", no ZK / no HTTP basic auth).
# internalSolr:
#   enabled: true
#   image: solr:8.11.2
#   imagePullPolicy: IfNotPresent
#   # RWO matches GDCC: standalone Solr index — "ReadWriteOnce ... sufficient" (not SolrCloud yet).
#   # https://k8s-docs.gdcc.io/en/latest/day1/storage.html#index-server
#   persistence:
#     enabled: true
#     size: 5Gi
#     storageClassName: ""
#   resources: {}

# # Wait for in-cluster Solr core ping before Payara (standalone). For external SolrCloud, set internalSolr.enabled: false,
