# See README.md ("Docker Compose stack").
#
# Workflow (run from repo root):
#   docker compose up -d
#   docker compose run --rm dev_branding
#
# The first line starts the stack. On a fresh project, dev_bootstrap then dev_branding run once
# via depends_on. Re-run the second line after you add an API token to secrets/api/key or change
# branding/branding.env (idempotent).

x-dataverseup-workflow:
  commands:
    - docker compose up -d
    - docker compose run --rm dev_branding

x-env-from-file: &env-from-file
  env_file:
    - .env

services:
    postgres:
      <<: *env-from-file
      container_name: postgres
      ports:
        - "5432:5432"
      image: postgres:15-alpine
      restart: unless-stopped

      environment:
        - "LC_ALL=C.UTF-8"
        - "POSTGRES_DB"
        - "POSTGRES_USER"
        - "POSTGRES_PASSWORD"
        - "POSTGRES_PORT"
      volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./triggers:/triggers

    solr:
      <<: *env-from-file
      image: coronawhy/solr:8.9.0
      platform: linux/amd64
      container_name: solr
      privileged: true
      ports:
        - "8983:8983"
      environment:
        - "SOLR_HOST=solr"
        - "SOLR_PORT=8983"
        - "SOLR_JAVA_MEM=-Xms1g -Xmx1g"
        - "SOLR_OPTS=-Dlog4j2.formatMsgNoLookups=true"
      volumes:
        - solr-data:/opt/solr/server/solr/dataverse/data
        # Schema only (see ops/solr-init-setup.md §2 for fetch + optional ./dv-solr-conf mount).
        - ./config/schema.xml:/var/solr/data/dataverse/conf/schema.xml
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.solr.rule=Host(`solr.${traefikhost}`)"
        - "traefik.http.routers.solr.entrypoints=websecure"
        - "traefik.http.routers.solr.tls=true"
        - "traefik.http.services.solr.loadbalancer.server.port=8983"

    minio:
      <<: *env-from-file
      # Please use fixed versions :D
      image: minio/minio:RELEASE.2021-10-06T23-36-31Z
      volumes:
        - minio_data:/data
      command:
        - server
        - /data
        - --console-address
        - ":9001"
      environment:
        - MINIO_ROOT_USER=love
        - MINIO_ROOT_PASSWORD=love1234
        # Do NOT use MINIO_DOMAIN or MINIO_SERVER_URL with Traefik.
        # All Routing is done by Traefik, just tell minio where to redirect to.
        - MINIO_BROWSER_REDIRECT_URL=https://minio-stash.${traefikhost}
      labels:
        - traefik.enable=true
        - traefik.http.routers.minio.rule=Host(`minio.${traefikhost}`)
        - traefik.http.routers.minio.entrypoints=websecure
        - traefik.http.routers.minio.tls=true
        - traefik.http.routers.minio.service=minio
        - traefik.http.services.minio.loadbalancer.server.port=9000
        - traefik.http.routers.minio-console.rule=Host(`minio-stash.${traefikhost}`)
        - traefik.http.routers.minio-console.entrypoints=websecure
        - traefik.http.routers.minio-console.tls=true
        - traefik.http.routers.minio-console.service=minio-console
        - traefik.http.services.minio-console.loadbalancer.server.port=9001

    dataverse:
      <<: *env-from-file
      image: ${DOCKER_HUB}:${VERSION}
      platform: linux/amd64
      container_name: dataverse
      privileged: true
      user:
        "root"
      ports:
        #- "443:443"
        - "4848:4848"
        - "8080:8080"
      environment:
        - "CVM_SERVER_NAME=CESSDA" #Optional
        - "WEBHOOK"
        - "CESSDA"
        - "CLARIN"
        - "doi_authority"
        - "doi_provider"
        - "doi_username"
        - "doi_password"
        - "dataciterestapiurlstring"
        - "baseurlstring"
        - "aws_bucket_name"
        - "aws_s3_profile"
        - "aws_endpoint_url"
        - "system_email"
        - "mailhost"
        - "mailuser"
        - "no_reply_email"
        - "smtp_password"
        - "smtp_port"
        - "socket_port"
        - "smtp_auth"
        - "smtp_starttls"
        - "smtp_enabled"
        - "smtp_type"
        - "federated_json_file"
        - "bucketname_1"
        - "minio_label_1"
        - "minio_bucket_1"
        - "bucketname_2"
        - "minio_profile_1"
        - "minio_label_2"
        - "minio_bucket_2"
        - "minio_profile_2"
        - "DATAVERSE_DB_HOST"
        - "DATAVERSE_DB_USER"
        - "DATAVERSE_DB_PASSWORD"
        - "DATAVERSE_DB_NAME"
        - "DATAVERSE_SERVICE_HOST"
        - "DATAVERSE_URL"
        - "SOLR_SERVICE_HOST"
        - "SOLR_SERVICE_PORT"
        - "CVM_SERVER_URL=https://ns.${traefikhost}"
        - "LANG=en"
        - "cvManager=http://"
        - "BUNDLEPROPERTIES=Bundle.properties"
        - "ADMIN_EMAIL=admin@${traefikhost}"
        - "MAIL_SERVER=mailrelay"
        - "SOLR_LOCATION=solr:8983"
        # Dataverse 6.x first-boot PID provider (empty DB has no legacy settings yet).
        - "DATAVERSE_PID_PROVIDERS=demo"
        - "DATAVERSE_PID_DEFAULT_PROVIDER=demo"
        - "DATAVERSE_PID_DEMO_TYPE=FAKE"
        - "DATAVERSE_PID_DEMO_LABEL=demo"
        - "DATAVERSE_PID_DEMO_AUTHORITY=10.5072"
        - "DATAVERSE_PID_DEMO_SHOULDER=FK2/"
        - "INIT_SCRIPTS_FOLDER"
        - "hostname"
        - "MAINLANG"
        - "POSTGRES_SERVER"
        - "POSTGRES_PORT"
        - "POSTGRES_DATABASE"
        - "POSTGRES_USER"
        - "POSTGRES_PASSWORD"
        - "PGPASSWORD"
        - "TWORAVENS_LOCATION=NOT INSTALLED"
        - "RSERVE_HOST=localhost"
        - "RSERVE_PORT=6311"
        - "RSERVE_USER=rserve"
        - "RSERVE_PASSWORD=rserve"
        - "JVM_OPTS='-Xmx1g -Xms1g -XX:MaxPermSize=2g -XX:PermSize=2g'"
      healthcheck:
        test: ["CMD-SHELL", "curl -sf --max-time 5 http://127.0.0.1:8080/api/info/version >/dev/null"]
        interval: 10s
        timeout: 8s
        retries: 60
        start_period: 300s
      depends_on:
        - postgres
        - solr
      volumes:
        - ${CONFIGURATION_PATH}/secrets:/secrets
        - dataverse_files:/data
        # Branding: URL /logos/* -> DATAVERSE_FILES_DOCROOT (/dv/docroot). Mount only logos/navbar so
        # /dv/docroot/logos/<id>/... (theme uploads) stays on the container filesystem.
        - ./branding/docroot/logos/navbar:/dv/docroot/logos/navbar:ro
        - ./branding/docroot/branding:/dv/docroot/branding:ro
        - ./init.d:/opt/payara/init.d
        - ./triggers:/opt/payara/triggers
        - ./config/schema.xml:/opt/payara/dvinstall/schema.xml
      labels:
        - "traefik.enable=true"
        - "traefik.http.services.dataverse.loadbalancer.server.port=8080"
        # Edge Traefik (sc proxy) terminates TLS; forward plain HTTP to Payara :8080.
        - "traefik.http.services.dataverse.loadbalancer.passHostHeader=true"
        # Match www and bare host (*.localhost.direct resolves via localhost.direct DNS).
        - "traefik.http.routers.dataverse.rule=Host(`www.${traefikhost}`) || Host(`${traefikhost}`)"
        - "traefik.http.routers.dataverse.entrypoints=websecure"
        - "traefik.http.routers.dataverse.tls=true"
        - "traefik.http.routers.dataverse.service=dataverse"

    dev_bootstrap:
      <<: *env-from-file
      image: gdcc/configbaker:${VERSION}
      platform: linux/amd64
      restart: "no"
      command:
        - bootstrap.sh
        - dev
      environment:
        - DATAVERSE_URL=http://dataverse:8080
        - TIMEOUT=20m
      depends_on:
        dataverse:
          condition: service_healthy

    # After bootstrap: apply branding/branding.env via Admin API (idempotent).
    # Re-run: docker compose run --rm dev_branding (see workflow at top of this file).
    dev_branding:
      <<: *env-from-file
      image: curlimages/curl:8.6.0
      restart: "no"
      entrypoint: ["/bin/sh", "/scripts/apply-branding.sh"]
      environment:
        DATAVERSE_INTERNAL_URL: http://dataverse:8080
        BRANDING_ENV_PATH: /branding/branding.env
      volumes:
        - ./scripts/apply-branding.sh:/scripts/apply-branding.sh:ro
        - ./branding:/branding:ro
        - ${CONFIGURATION_PATH}/secrets:/secrets:ro
      depends_on:
        dev_bootstrap:
          condition: service_completed_successfully

volumes:
  postgres_data:
  solr-data:
  minio_data:
  dataverse_files:

networks:
  default:
    name: stackcar
