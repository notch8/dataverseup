# Starter overrides — NOT a drop-in install. Copy and replace placeholders:
#   <namespace>     your Kubernetes namespace
#   <release>       helm release name (affects resource names unless fullnameOverride is set)
#   <db-host>       Postgres hostname (in-cluster DNS)
#   <solr-conf-cm>  ConfigMap name with full Dataverse Solr conf (or solr-conf.tgz key)
#
# Create a Secret (e.g. dataverse-app-env) with DB password and reference it in extraEnvFrom.
# See docs/HELM.md for the full install order.

fullnameOverride: dataverse

replicaCount: 1

resources:
  requests:
    memory: 2Gi
    cpu: "500m"
  limits:
    memory: 4Gi
    cpu: "2"

persistence:
  enabled: true
  size: 20Gi

podSecurityContext:
  fsGroup: 1000

extraEnvFrom:
  - secretRef:
      name: dataverse-app-env

extraEnvVars:
  - name: INIT_SCRIPTS_FOLDER
    value: "/opt/payara/init.d"
  - name: DATAVERSE_PID_PROVIDERS
    value: "demo"
  - name: DATAVERSE_PID_DEFAULT_PROVIDER
    value: "demo"
  - name: DATAVERSE_PID_DEMO_TYPE
    value: "FAKE"
  - name: DATAVERSE_PID_DEMO_LABEL
    value: "demo"
  - name: DATAVERSE_PID_DEMO_AUTHORITY
    value: "10.5072"
  - name: DATAVERSE_PID_DEMO_SHOULDER
    value: "FK2/"

internalSolr:
  enabled: true
  persistence:
    enabled: true
    size: 8Gi

solrInit:
  enabled: true
  mode: standalone
  confConfigMap: "<solr-conf-cm>"
  solrHttpBase: "http://dataverse-solr.<namespace>.svc.cluster.local:8983"
  zkConnect: ""

bootstrapJob:
  enabled: true
  helmHook: true

ingress:
  enabled: false
