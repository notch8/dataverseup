{{- if .Values.bootstrapJob.enabled }}
{{- $dvUrl := .Values.bootstrapJob.dataverseUrl | default (printf "http://%s.%s.svc.cluster.local:%v" (include "dataverseup.fullname" .) .Release.Namespace .Values.service.port) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "dataverseup.fullname" . }}-bootstrap{{ if not .Values.bootstrapJob.helmHook }}-once{{ end }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dataverseup.labels" . | nindent 4 }}
    app.kubernetes.io/component: configbaker-bootstrap
  {{- if .Values.bootstrapJob.helmHook }}
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-weight: "15"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
  {{- end }}
spec:
  backoffLimit: {{ .Values.bootstrapJob.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.bootstrapJob.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "dataverseup.bootstrapPodLabels" . | nindent 8 }}
        app.kubernetes.io/component: configbaker-bootstrap
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: configbaker
          image: "{{ .Values.bootstrapJob.image.repository }}:{{ .Values.bootstrapJob.image.tag | default .Values.image.tag }}"
          imagePullPolicy: {{ .Values.bootstrapJob.image.pullPolicy }}
          {{- if eq .Values.bootstrapJob.mode "compose" }}
          command: ["/bin/bash", "/bootstrap-chain/bootstrap-chain.sh"]
          env:
            - name: DATAVERSE_URL
              value: {{ $dvUrl | quote }}
            - name: DATAVERSE_INTERNAL_URL
              value: {{ $dvUrl | quote }}
            - name: DATAVERSE_BOOTSTRAP_SECRETS_DIR
              value: "/work"
            - name: DATAVERSE_BOOTSTRAP_ENV_FILE
              value: "/work/api/bootstrap.env"
            - name: BOOTSTRAP_CHAIN_WAIT_MAX_SECONDS
              value: {{ .Values.bootstrapJob.compose.waitMaxSeconds | toString | quote }}
            - name: BOOTSTRAP_CHAIN_WAIT_SLEEP
              value: {{ .Values.bootstrapJob.compose.waitSleepSeconds | toString | quote }}
            - name: BOOTSTRAP_CHAIN_SEED
              value: {{ if .Values.bootstrapJob.compose.seed }}"1"{{ else }}"0"{{ end }}
            - name: BRANDING_ENV_PATH
              value: "/config/branding.env"
            - name: TIMEOUT
              value: {{ .Values.bootstrapJob.timeout | quote }}
            {{- if .Values.bootstrapJob.compose.existingAdminApiTokenSecret }}
            - name: DATAVERSE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrapJob.compose.existingAdminApiTokenSecret | quote }}
                  key: {{ .Values.bootstrapJob.compose.adminApiTokenSecretKey | default "token" | quote }}
                  optional: true
            {{- end }}
          volumeMounts:
{{ include "dataverseup.bootstrapComposeVolumeMounts" . | nindent 12 }}
          {{- else }}
          command: {{- toYaml .Values.bootstrapJob.command | nindent 12 }}
          env:
{{ include "dataverseup.bootstrapJobMinimalEnv" (dict "dvUrl" $dvUrl "timeout" .Values.bootstrapJob.timeout) | indent 12 }}
          {{- end }}
          {{- with .Values.bootstrapJob.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if eq .Values.bootstrapJob.mode "compose" }}
      volumes:
{{ include "dataverseup.bootstrapComposeVolumes" . | nindent 8 }}
      {{- end }}
{{- end }}
