apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "dataverseup.fullname" . }}-test-connection"
  labels:
    {{- include "dataverseup.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ["wget"]
      args:
        - "-qO-"
        - "http://{{ include "dataverseup.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}/api/info/version"
  restartPolicy: Never
