{{- if .Values.internalSolr.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dataverseup.fullname" . }}-solr
  labels:
    {{- include "dataverseup.internalSolrLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8983
      targetPort: solr-http
      protocol: TCP
      name: solr-http
  selector:
    {{- include "dataverseup.internalSolrSelectorLabels" . | nindent 4 }}
{{- end }}
